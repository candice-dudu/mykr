<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的專屬韓語單字本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg-oat: #F4F1EA;
      --sage-green: #8DA399;
      --sage-dark: #6C8178;
      --coral-red: #D98880;
      --gold-star: #D4AF37;
      --text-dark: #333333;
      --text-light: #777777;
    }

    body {
      background-color: var(--bg-oat);
      color: var(--text-dark);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overscroll-behavior-y: none;
    }

    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .card-container { transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1); }
    
    .btn-action { transition: all 0.2s; }
    .btn-action:active { transform: scale(0.95); }
    
    .tag-btn { transition: all 0.2s; white-space: nowrap; }
    .tag-btn.active { background-color: var(--sage-dark); color: white; border-color: var(--sage-dark); }
    
    .mode-btn { transition: all 0.3s; }
    .mode-btn.active { background-color: white; color: var(--sage-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; }
    
    .quiz-option { transition: all 0.2s; }
    .quiz-option:active { transform: scale(0.98); }
    .quiz-correct { background-color: #E8F5E9 !important; border-color: #4CAF50 !important; color: #2E7D32 !important; }
    .quiz-wrong { background-color: #FFEBEE !important; border-color: #F44336 !important; color: #C62828 !important; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader { border: 4px solid #e0dcd3; border-top: 4px solid var(--sage-green); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
  </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col items-center py-4 px-4 relative overflow-hidden">

  <!-- Loading 遮罩：數據讀取中顯示 -->
  <div id="loadingOverlay" class="absolute inset-0 bg-[var(--bg-oat)] z-50 flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="loader mb-3"></div>
    <p class="text-[var(--sage-dark)] font-bold text-sm" id="loadingText">正在同步 GitHub 單字庫...</p>
  </div>

  <a href="index.html" class="absolute top-4 left-4 z-40 w-10 h-10 bg-white rounded-full flex justify-center items-center shadow-sm border border-gray-200 text-gray-500 hover:text-[var(--sage-dark)] active:scale-95 transition-all">
    <i class="ph-bold ph-house text-xl"></i>
  </a>

  <div id="mascotChat" class="absolute top-6 right-4 flex items-center gap-2 opacity-0 transition-opacity duration-500 z-40 pointer-events-none">
    <div class="bg-white px-3 py-2 rounded-2xl rounded-tr-none shadow-md text-sm font-medium text-[var(--sage-dark)]" id="mascotMessage">做得好！</div>
    <img id="mascotIcon" src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cat/3D/cat_3d.png" alt="Mascot" class="w-12 h-12 object-contain drop-shadow-md">
  </div>

  <div class="flex bg-gray-200 rounded-full p-1 mb-3 mt-12 w-full max-w-[240px] shrink-0">
    <button id="modeStudyBtn" onclick="switchMode('study')" class="mode-btn active flex-1 rounded-full py-1.5 text-sm text-gray-500 flex justify-center items-center gap-1">
      <i class="ph-bold ph-cards"></i> 學習
    </button>
    <button id="modeQuizBtn" onclick="switchMode('quiz')" class="mode-btn flex-1 rounded-full py-1.5 text-sm text-gray-500 flex justify-center items-center gap-1">
      <i class="ph-bold ph-target"></i> 測驗
    </button>
  </div>

  <div class="w-full max-w-sm mb-3 shrink-0">
    <div class="flex overflow-x-auto gap-2 pb-1 no-scrollbar" id="tagContainer"></div>
  </div>

  <div class="w-full max-w-sm mb-4 shrink-0 px-1">
    <div class="flex justify-between items-end mb-1 px-1">
      <div class="text-xs font-bold text-[var(--sage-dark)] tracking-wider" id="progressTitle">學習進度</div>
      <div class="text-xs font-medium text-[var(--text-light)]">
        <span id="learnedCount">0</span> / <span id="totalCountDisplay">0</span> 
      </div>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2">
      <div id="progressBar" class="bg-[var(--sage-green)] h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <div class="w-full max-w-sm flex-1 min-h-0 relative perspective-1000 mb-4" id="flashcardWrapper">
    <div class="card-container w-full h-full absolute transform-style-3d shadow-lg rounded-3xl cursor-pointer" id="cardContainer" onclick="handleCardClick()">
      <div class="absolute w-full h-full bg-white rounded-3xl p-6 flex flex-col items-center backface-hidden border-t-[8px] border-[var(--sage-green)] overflow-y-auto no-scrollbar">
        <span id="wordTag" class="absolute top-4 left-4 bg-gray-100 text-[var(--sage-dark)] text-[10px] px-2.5 py-1 rounded-full font-bold shadow-sm border border-gray-200 uppercase tracking-tighter">--</span>
        <div id="frequencyStars" class="absolute top-4 right-4 flex gap-0.5 text-[var(--gold-star)] text-[10px]"></div>
        <div class="flex flex-col items-center mt-8 mb-4 w-full shrink-0">
          <h1 id="koreanWord" class="text-4xl font-bold text-center text-gray-800 mb-1 tracking-wide">--</h1>
          <h3 id="hanjaText" class="text-sm text-gray-400 font-serif tracking-widest border-b border-gray-100 pb-1 px-4 mb-1">--</h3>
          <button id="frontMiniPlayBtn" onclick="playCurrentWordAudio(event)" class="text-[var(--sage-green)] hover:text-[var(--sage-dark)] p-2 active:scale-90 hidden">
            <i class="ph-fill ph-speaker-high text-2xl"></i>
          </button>
        </div>
        <div id="flipHint" class="mt-auto mb-2 text-[var(--sage-green)] text-xs flex items-center gap-1 font-bold bg-gray-50 px-4 py-2 rounded-full shadow-inner shrink-0">
          <i class="ph-bold ph-arrows-clockwise text-lg"></i> 點擊翻面
        </div>
        <div id="quizOptionsContainer" class="w-full flex flex-col gap-2 mt-2 hidden"></div>
      </div>
      <div class="absolute w-full h-full bg-white rounded-3xl p-6 flex flex-col backface-hidden rotate-y-180 border-t-[8px] border-[var(--sage-dark)] overflow-y-auto no-scrollbar cursor-default" onclick="event.stopPropagation()">
        <button onclick="forceCloseCard()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="ph-bold ph-x text-xl"></i></button>
        <div class="flex justify-between items-start border-b pb-3 mb-4 mt-2">
          <div>
            <h2 id="koreanWordBack" class="text-2xl font-bold text-gray-800">--</h2>
            <p id="hanjaTextBack" class="text-sm text-gray-400 font-serif tracking-widest mt-0.5">--</p>
          </div>
          <button onclick="playCurrentWordAudio(event)" class="text-[var(--sage-green)] hover:text-[var(--sage-dark)] active:scale-90"><i class="ph-fill ph-speaker-high text-3xl"></i></button>
        </div>
        <div class="flex-grow">
          <p class="text-[11px] text-[var(--sage-green)] font-bold mb-1 flex items-center gap-1 uppercase"><i class="ph-bold ph-book-open"></i> 釋義</p>
          <p id="chineseMeaning" class="text-xl font-bold text-gray-700 mb-5">--</p>
          <div id="exampleBlockWrapper">
            <p class="text-[11px] text-[var(--sage-green)] font-bold mb-2 flex items-center uppercase"><i class="ph-bold ph-chat-circle-text mr-1"></i> 例句</p>
            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100">
              <p id="koreanExample" class="text-[15px] text-gray-800 leading-relaxed font-medium mb-1.5">--</p>
              <p id="chineseExample" class="text-sm text-gray-500 leading-relaxed">--</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="actionButtons" class="w-full max-w-sm mb-6 flex justify-center items-center gap-8 px-4 opacity-0 transition-opacity duration-300 pointer-events-none shrink-0">
    <button onclick="markAs('forget', event)" class="btn-action flex flex-col items-center gap-1 text-[var(--coral-red)] group">
      <div class="w-14 h-14 bg-white rounded-full border-2 border-[var(--coral-red)] flex justify-center items-center group-active:bg-[var(--coral-red)] group-active:text-white transition-colors shadow-sm"><i class="ph-bold ph-x text-2xl"></i></div>
      <span class="text-xs font-bold mt-1">還不熟</span>
    </button>
    <button id="frontPlayBtn" onclick="playCurrentWordAudio(event)" class="btn-action bg-[var(--sage-green)] text-white rounded-full w-16 h-16 flex justify-center items-center shadow-lg z-10 pointer-events-auto"><i class="ph-fill ph-speaker-high text-3xl"></i></button>
    <button onclick="markAs('remember', event)" class="btn-action flex flex-col items-center gap-1 text-[var(--sage-dark)] group">
      <div class="w-14 h-14 bg-white rounded-full border-2 border-[var(--sage-dark)] flex justify-center items-center group-active:bg-[var(--sage-dark)] group-active:text-white transition-colors shadow-sm"><i class="ph-bold ph-check text-2xl"></i></div>
      <span class="text-xs font-bold mt-1">我會了</span>
    </button>
  </div>

  <script>
    let masterVocabList = []; 
    let currentMode = 'study';
    let currentFilterTag = 'all'; 
    let filteredVocabList = [];   
    let studyQueue = [];          
    let currentWordData = null;
    let isFlipped = false;
    let learnedCount = 0;
    let quizAnswered = false;

    const els = {
      loadingOverlay: document.getElementById('loadingOverlay'),
      cardContainer: document.getElementById('cardContainer'),
      wordTag: document.getElementById('wordTag'),
      koreanWord: document.getElementById('koreanWord'),
      hanjaText: document.getElementById('hanjaText'),
      frequencyStars: document.getElementById('frequencyStars'),
      koreanWordBack: document.getElementById('koreanWordBack'),
      hanjaTextBack: document.getElementById('hanjaTextBack'),
      chineseMeaning: document.getElementById('chineseMeaning'),
      koreanExample: document.getElementById('koreanExample'),
      chineseExample: document.getElementById('chineseExample'),
      exampleBlockWrapper: document.getElementById('exampleBlockWrapper'),
      totalCount: document.getElementById('totalCountDisplay'),
      learnedCount: document.getElementById('learnedCount'),
      progressBar: document.getElementById('progressBar'),
      actionButtons: document.getElementById('actionButtons'),
      frontPlayBtn: document.getElementById('frontPlayBtn'),
      frontMiniPlayBtn: document.getElementById('frontMiniPlayBtn'),
      flipHint: document.getElementById('flipHint'),
      quizOptionsContainer: document.getElementById('quizOptionsContainer'),
      mascotChat: document.getElementById('mascotChat'),
      mascotMessage: document.getElementById('mascotMessage'),
      mascotIcon: document.getElementById('mascotIcon'),
      tagContainer: document.getElementById('tagContainer')
    };

    // --- 關鍵修正：從 word.json 抓取數據 ---
    async function initApp() {
      try {
        const response = await fetch('word.json');
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        masterVocabList = await response.json();
      } catch (error) {
        console.warn("無法讀取 word.json。使用內建後備資料。");
        masterVocabList = [
         { word: "미리보기", hanja: "[對策]", meaning: "預覽", tag: "系統", frequency: 5, example_ko: "이것은 미리보기 단어입니다.", example_zh: "這是預覽單字。", example_type: "topik" }
        ];
      } finally {
        els.loadingOverlay.style.opacity = '0';
        setTimeout(() => els.loadingOverlay.style.display = 'none', 300);
        generateTags();
        applyFilter('all');
      }
    }

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('modeStudyBtn').classList.toggle('active', mode === 'study');
      document.getElementById('modeQuizBtn').classList.toggle('active', mode === 'quiz');
      startStudySession();
    }

    function generateTags() {
      const tags = [...new Set(masterVocabList.map(item => item.tag))].filter(Boolean);
      let html = `<button id="tagBtn-all" class="tag-btn active border border-gray-300 rounded-full px-4 py-1.5 text-[13px] font-bold bg-white text-gray-600 shadow-sm" onclick="applyFilter('all')">全部</button>`;
      tags.forEach(tag => {
        html += `<button id="tagBtn-${tag}" class="tag-btn border border-gray-300 rounded-full px-4 py-1.5 text-[13px] font-bold bg-white text-gray-600 shadow-sm" onclick="applyFilter('${tag}')">${tag}</button>`;
      });
      els.tagContainer.innerHTML = html;
    }

    function applyFilter(tag) {
      currentFilterTag = tag;
      document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active', 'bg-[var(--sage-dark)]', 'text-white', 'border-[var(--sage-dark)]'));
      const activeBtn = document.getElementById(`tagBtn-${tag}`);
      if(activeBtn) activeBtn.classList.add('active', 'bg-[var(--sage-dark)]', 'text-white', 'border-[var(--sage-dark)]');
      filteredVocabList = tag === 'all' ? [...masterVocabList] : masterVocabList.filter(item => item.tag === tag);
      startStudySession();
    }

    function startStudySession() {
      studyQueue = [...filteredVocabList].sort(() => Math.random() - 0.5);
      learnedCount = 0;
      els.totalCount.innerText = filteredVocabList.length;
      updateProgress();
      if (isFlipped) forceCloseCard();
      if(studyQueue.length > 0) loadNextWord();
      else showCompletionScreen("暫無單字");
    }

    function loadNextWord() {
      if (studyQueue.length === 0) { showCompletionScreen("🎉 完美通關！"); return; }
      quizAnswered = false;
      currentWordData = studyQueue[0];
      els.wordTag.innerText = currentWordData.tag || '未分類';
      els.frequencyStars.innerHTML = Array(currentWordData.frequency || 0).fill('<i class="ph-fill ph-star"></i>').join('');
      els.koreanWord.innerText = currentWordData.word;
      els.koreanWordBack.innerText = currentWordData.word;
      if (currentWordData.hanja) {
        els.hanjaText.innerText = currentWordData.hanja;
        els.hanjaTextBack.innerText = currentWordData.hanja;
        els.hanjaText.style.display = 'block';
      } else {
        els.hanjaText.style.display = 'none';
      }
      els.chineseMeaning.innerText = currentWordData.meaning;
      if (currentWordData.example_ko) {
        els.exampleBlockWrapper.style.display = 'block';
        els.koreanExample.innerText = currentWordData.example_ko;
        els.chineseExample.innerText = currentWordData.example_zh || '';
      } else {
        els.exampleBlockWrapper.style.display = 'none';
      }
      currentMode === 'study' ? setupStudyUI() : setupQuizUI();
    }

    function setupStudyUI() {
      els.flipHint.style.display = 'flex';
      els.quizOptionsContainer.style.display = 'none';
      els.frontMiniPlayBtn.classList.add('hidden');
      els.actionButtons.classList.replace('opacity-100', 'opacity-0');
      els.actionButtons.classList.add('pointer-events-none');
      els.frontPlayBtn.style.display = 'flex';
      els.cardContainer.onclick = toggleFlip;
    }

    function setupQuizUI() {
      els.flipHint.style.display = 'none';
      els.quizOptionsContainer.style.display = 'flex';
      els.frontMiniPlayBtn.classList.remove('hidden');
      els.actionButtons.classList.add('opacity-0', 'pointer-events-none');
      els.cardContainer.onclick = null; 
      generateQuizOptions();
    }

    function generateQuizOptions() {
      const wrongOptions = masterVocabList.filter(w => w.word !== currentWordData.word).sort(() => 0.5 - Math.random()).slice(0, 2);
      const allOptions = [ { text: currentWordData.meaning, isCorrect: true }, ...wrongOptions.map(w => ({ text: w.meaning, isCorrect: false })) ].sort(() => 0.5 - Math.random()); 
      els.quizOptionsContainer.innerHTML = '';
      allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option w-full py-3 px-4 border border-gray-200 rounded-2xl text-gray-700 text-sm font-bold text-center bg-white shadow-sm';
        btn.innerText = opt.text;
        btn.onclick = (e) => handleQuizAnswer(e, btn, opt.isCorrect);
        els.quizOptionsContainer.appendChild(btn);
      });
    }

    function handleQuizAnswer(event, btnElement, isCorrect) {
      event.stopPropagation();
      if (quizAnswered) return;
      quizAnswered = true;
      if (isCorrect) {
        btnElement.classList.add('quiz-correct');
        markAs('remember', null, true);
      } else {
        btnElement.classList.add('quiz-wrong');
        els.quizOptionsContainer.querySelectorAll('button').forEach(b => { if (b.innerText === currentWordData.meaning) b.classList.add('quiz-correct'); });
        markAs('forget', null, true);
      }
    }

    function handleCardClick() { if (currentMode === 'study') toggleFlip(); }
    function toggleFlip() {
      isFlipped = !isFlipped;
      els.cardContainer.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
      if (isFlipped) {
        els.actionButtons.classList.replace('opacity-0', 'opacity-100');
        els.actionButtons.classList.remove('pointer-events-none');
        els.frontPlayBtn.style.display = 'none';
      } else {
        els.actionButtons.classList.replace('opacity-100', 'opacity-0');
        els.actionButtons.classList.add('pointer-events-none');
        els.frontPlayBtn.style.display = 'flex';
      }
    }

    function forceCloseCard() { isFlipped = false; els.cardContainer.style.transform = 'rotateY(0deg)'; }

    function markAs(status, event, isFromQuiz = false) {
      if (event) event.stopPropagation();
      const word = studyQueue.shift();
      if (status === 'remember') learnedCount++;
      else studyQueue.push(word);
      updateProgress();
      if (!isFromQuiz) forceCloseCard();
      setTimeout(() => loadNextWord(), isFromQuiz ? 1200 : 200);
    }

    function updateProgress() {
      els.learnedCount.innerText = learnedCount;
      const percentage = filteredVocabList.length === 0 ? 0 : (learnedCount / filteredVocabList.length) * 100;
      els.progressBar.style.width = `${percentage}%`;
    }

    function showCompletionScreen(title) {
      els.koreanWord.innerText = title;
      els.chineseMeaning.innerText = "今日任務已完成！";
      els.exampleBlockWrapper.style.display = 'none';
      els.flipHint.style.display = 'none';
      els.actionButtons.style.opacity = '0';
    }

    function playCurrentWordAudio(event) {
      if (event) event.stopPropagation();
      if (!currentWordData) return;
      const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ko&client=tw-ob&q=${encodeURIComponent(currentWordData.word)}`;
      new Audio(audioUrl).play().catch(e => console.log("播放失敗", e));
    }

    window.onload = initApp;
  </script>
</body>
</html>
